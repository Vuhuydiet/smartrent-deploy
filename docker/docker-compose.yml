services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - ai

  backend:
    image: vuhuydiet/smartrent-backend:${BACKEND_TAG:-latest}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: "8080"
      # Database (Managed Database)
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
      IDENTITY_SERVICE_DB_URL: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      REDIS_HOST: redis
      REDIS_PWD: ""
      # JWT
      ACCESS_SIGNER_KEY: ${ACCESS_SIGNER_KEY}
      REFRESH_SIGNER_KEY: ${REFRESH_SIGNER_KEY}
      RESET_PASSWORD_SIGNER_KEY: ${RESET_PASSWORD_SIGNER_KEY}
      VALID_DURATION: "3600"
      REFRESHABLE_DURATION: "86400"
      RESET_PASSWORD_DURATION: "900"
      # Email (Brevo)
      BREVO_API_KEY: ${BREVO_API_KEY}
      SENDER_EMAIL: ${SENDER_EMAIL}
      SENDER_NAME: "SmartRent"
      # Google OAuth
      CLIENT_ID: ${GOOGLE_CLIENT_ID}
      CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_AUTH_CLIENT_REDIRECT_URI: ${GOOGLE_AUTH_CLIENT_REDIRECT_URI}
      # Cloudflare R2 Storage
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_REGION: ${R2_REGION:-auto}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL}
      R2_MAX_IMAGE_SIZE_MB: ${R2_MAX_IMAGE_SIZE_MB:-10}
      R2_MAX_VIDEO_SIZE_MB: ${R2_MAX_VIDEO_SIZE_MB:-100}
      R2_UPLOAD_URL_TTL_MINUTES: ${R2_UPLOAD_URL_TTL_MINUTES:-10}
      R2_DOWNLOAD_URL_TTL_MINUTES: ${R2_DOWNLOAD_URL_TTL_MINUTES:-60}
      # VNPay
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET}
      VNPAY_PAYMENT_URL: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      VNPAY_QUERY_URL: sandbox.vnpayment.vn
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL}
      VNPAY_IPN_URL: https://${API_DOMAIN}/v1/payments/ipn/VNPAY
      # Google Maps
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      # App
      CLIENT_URL: ${CLIENT_URL}
      ADMIN_URL: ${ADMIN_URL}
      CACHE_TYPE: redis
      AI_SERVICE_BASE_URL: http://ai:8000
      APPLICATION_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_SMARTRENT: DEBUG
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    depends_on:
      redis:
        condition: service_healthy

  ai:
    image: vuhuydiet/smartrent-ai:${AI_TAG:-latest}
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${SPRING_PROFILES_ACTIVE:-dev}
      APP_NAME: "SmartRent AI Service"
      VERSION: "1.0.0"
      DEBUG: "false"
      SMARTRENT_BACKEND_URL: http://backend:8080
      # Database (Managed Database)
      MYSQL_SERVER: ${DB_HOST}
      MYSQL_PORT: ${DB_PORT}
      MYSQL_DB: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      # Vertex AI (Gemini)
      GCP_CREDENTIALS_BASE64: ${GCP_CREDENTIALS_BASE64}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_LOCATION: ${GCP_LOCATION:-us-central1}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.5-flash}
      GEMINI_VISION_MODEL: ${GEMINI_VISION_MODEL:-gemini-2.5-flash}
      GEMINI_PRICE_MODEL: ${GEMINI_PRICE_MODEL:-gemini-2.0-flash-exp}
      # Chat
      MAX_LISTINGS_RETURN: ${MAX_LISTINGS_RETURN:-5}
      # Langfuse
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:8.2.0-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
  caddy_data:
  caddy_config:
